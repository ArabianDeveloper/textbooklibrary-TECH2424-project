{% extends "base.html" %}
{% block title %}Catalog{% endblock %}

{% block extra_css %}
<style>
    .catalog-header { margin-bottom: 1.5rem; }
    .book-card { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <h1>📚 Book Catalog</h1>
</div>
<div class="row g-4">
    <div class="col-md-4">
        <div class="card book-card">
            <div class="card-body">
                <h5 class="card-title">Introduction to Python</h5>
                <p class="card-text">John Smith &middot; 3rd Edition &middot; 2024</p>
                <a href="#" class="btn btn-primary">Details</a>
            </div>
        </div>
    </div>
    <!-- additional sample cards could follow -->
</div>
{% endblock %}
